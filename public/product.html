<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — Elegant La Vie</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{--emerald-deep:#0a1f1a;--gold:#c9a84c;--gold-light:#e2c47e;--gold-dim:#8a6f2e;--cream:#f5f0e8;--glass:rgba(255,255,255,0.04);--glass-border:rgba(201,168,76,0.2);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--emerald-deep);color:var(--cream);font-family:'Montserrat',sans-serif;}
.font-display{font-family:'Cinzel',serif;}.font-serif{font-family:'Cormorant Garamond',serif;}
.gold-text{background:linear-gradient(135deg,var(--gold-light),var(--gold),var(--gold-dim));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.glass-card{background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(20px);}
.gold-line{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.btn-gold{background:linear-gradient(135deg,var(--gold-dim),var(--gold),var(--gold-light),var(--gold));background-size:200% auto;color:var(--emerald-deep);font-family:'Cinzel',serif;letter-spacing:.15em;font-weight:600;transition:all .3s;}
.btn-gold:hover{background-position:right center;transform:translateY(-2px);box-shadow:0 10px 30px rgba(201,168,76,.4);}
.navbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,31,26,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,168,76,.15);}
.cart-badge{position:absolute;top:-6px;right:-6px;background:var(--gold);color:var(--emerald-deep);width:18px;height:18px;border-radius:50%;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--emerald-deep);}::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px;}
</style>
</head>
<body>
<nav class="navbar px-6 py-5">
  <div class="max-w-7xl mx-auto flex items-center justify-between">
    <a href="index.html" class="font-display text-xl tracking-[0.3em] gold-text">ELEGANT LA VIE</a>
    <div class="hidden md:flex items-center gap-8 text-xs tracking-[0.2em] uppercase font-light">
      <a href="index.html" class="hover:text-yellow-300 transition-colors">Home</a>
      <a href="products.html" class="hover:text-yellow-300 transition-colors">Collection</a>
      <a href="quiz.html" class="hover:text-yellow-300 transition-colors">Scent Quiz</a>
    </div>
    <div class="flex items-center gap-5">
      <a href="cart.html" class="relative">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
        <span class="cart-badge" id="cart-count">0</span>
      </a>
      <a href="login.html" id="auth-link" class="text-xs tracking-[0.2em] uppercase hover:text-yellow-300 transition-colors">Login</a>
    </div>
  </div>
</nav>

<div class="pt-28 pb-20 px-6 min-h-screen" id="product-detail">
  <div class="max-w-6xl mx-auto">
    <!-- Loading state -->
    <div id="loading" class="flex items-center justify-center py-32">
      <div class="text-center">
        <div class="w-12 h-12 border-2 border-yellow-700 border-t-yellow-400 rounded-full animate-spin mx-auto mb-4"></div>
        <p class="font-serif text-gray-500 italic">Loading fragrance details...</p>
      </div>
    </div>
    <!-- Product content -->
    <div id="product-content" class="hidden">
      <a href="products.html" class="text-xs font-display tracking-[0.2em] text-yellow-700 hover:text-yellow-400 mb-10 inline-flex items-center gap-2 transition-colors">
        ← BACK TO COLLECTION
      </a>
      <div class="grid md:grid-cols-2 gap-16 mt-6">
        <!-- Image -->
        <div>
          <div class="aspect-square rounded-2xl overflow-hidden glass-card">
            <img id="p-image" src="" alt="" class="w-full h-full object-cover">
          </div>
        </div>
        <!-- Details -->
        <div class="flex flex-col justify-center">
          <span id="p-mood" class="font-display text-xs tracking-[0.3em] text-yellow-600 mb-4"></span>
          <h1 id="p-name" class="font-display text-4xl md:text-5xl gold-text mb-4"></h1>
          <div class="gold-line mb-6"></div>
          <p id="p-desc" class="font-serif text-gray-300 text-lg italic leading-relaxed mb-6"></p>
          
          <div class="mb-6">
            <p class="font-display text-xs tracking-[0.3em] text-yellow-700 mb-3">SCENT NOTES</p>
            <div id="p-notes" class="flex flex-wrap gap-2"></div>
          </div>

          <div class="mb-8">
            <span id="p-price" class="font-display text-4xl gold-text"></span>
          </div>

          <!-- Quantity -->
          <div class="flex items-center gap-4 mb-6">
            <div class="glass-card flex items-center rounded-lg overflow-hidden">
              <button onclick="changeQty(-1)" class="px-4 py-3 hover:bg-white hover:bg-opacity-5 transition-colors text-yellow-400 font-display">−</button>
              <span id="qty" class="px-6 py-3 font-display text-sm">1</span>
              <button onclick="changeQty(1)" class="px-4 py-3 hover:bg-white hover:bg-opacity-5 transition-colors text-yellow-400 font-display">+</button>
            </div>
          </div>

          <div class="flex gap-4">
            <button onclick="addToCartAndGo()" class="btn-gold flex-1 py-4 text-xs tracking-[0.2em] rounded-xl">ADD TO CART</button>
            <button onclick="buyNow()" class="glass-card flex-1 py-4 text-xs font-display tracking-[0.2em] text-yellow-400 hover:border-yellow-500 transition-all rounded-xl">BUY NOW</button>
          </div>

          <div class="mt-8 glass-card p-5 rounded-xl">
            <div class="grid grid-cols-3 gap-4 text-center">
              <div>
                <div class="text-yellow-500 mb-1">✦</div>
                <p class="font-display text-xs tracking-wider text-gray-500">AUTHENTIC</p>
              </div>
              <div>
                <div class="text-yellow-500 mb-1">✦</div>
                <p class="font-display text-xs tracking-wider text-gray-500">LUXURY</p>
              </div>
              <div>
                <div class="text-yellow-500 mb-1">✦</div>
                <p class="font-display text-xs tracking-wider text-gray-500">PREMIUM</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="product-error" class="hidden text-center py-32">
      <p class="font-serif text-gray-500 text-xl italic">Product not found.</p>
      <a href="products.html" class="inline-block mt-4 btn-gold px-8 py-3 text-xs tracking-widest rounded-lg">Back to Collection</a>
    </div>
  </div>
</div>

<footer class="border-t py-10 px-6 text-center" style="border-color:rgba(201,168,76,0.15);background:rgba(5,15,12,0.8);">
  <h3 class="font-display text-xl tracking-[0.3em] gold-text mb-3">ELEGANT LA VIE</h3>
  <p class="text-xs text-gray-600">📞 03008206118 &nbsp;|&nbsp; 💬 WhatsApp: 03008206118</p>
  <p class="text-xs text-gray-700 mt-3">© 2024 Elegant La Vie. All rights reserved.</p>
</footer>

<script>
let currentProduct = null;
let quantity = 1;

function getCart(){ try{ return JSON.parse(localStorage.getItem('elv_cart')||'[]'); }catch{ return []; } }
function saveCart(c){ localStorage.setItem('elv_cart', JSON.stringify(c)); }
function updateCartCount(){ document.getElementById('cart-count').textContent = getCart().reduce((s,i)=>s+i.quantity,0); }

const token = localStorage.getItem('elv_token');
if(token){ const u=JSON.parse(localStorage.getItem('elv_user')||'{}'); document.getElementById('auth-link').textContent=u.name?.split(' ')[0]||'Account'; }

function changeQty(d){ quantity = Math.max(1, quantity+d); document.getElementById('qty').textContent=quantity; }

async function loadProduct(){
  const id = new URLSearchParams(window.location.search).get('id');
  if(!id){ showError(); return; }
  try{
    const res = await fetch(`/api/products/${id}`);
    if(!res.ok){ showError(); return; }
    const data = await res.json();
    currentProduct = data.product;
    document.title = `${currentProduct.name} — Elegant La Vie`;
    document.getElementById('p-image').src = currentProduct.image || 'https://images.unsplash.com/photo-1541643600914-78b084683702?w=600';
    document.getElementById('p-image').alt = currentProduct.name;
    document.getElementById('p-mood').textContent = `✦ ${currentProduct.scent_mood.toUpperCase()} ✦`;
    document.getElementById('p-name').textContent = currentProduct.name;
    document.getElementById('p-desc').textContent = currentProduct.description || '';
    document.getElementById('p-price').textContent = `$${currentProduct.price}`;
    const notes = (currentProduct.scent_notes||'').split(',');
    document.getElementById('p-notes').innerHTML = notes.map(n=>`<span style="display:inline-block;padding:5px 14px;border-radius:16px;background:rgba(26,107,84,0.3);border:1px solid rgba(26,107,84,0.5);font-size:0.75rem;letter-spacing:0.1em;color:rgba(245,240,232,0.7);">${n.trim()}</span>`).join('');
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('product-content').classList.remove('hidden');
  }catch(e){ showError(); }
}

function showError(){
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('product-error').classList.remove('hidden');
}

function addToCartAndGo(){
  if(!currentProduct) return;
  const cart = getCart();
  const ex = cart.find(i=>i.id===currentProduct.id);
  if(ex) ex.quantity+=quantity;
  else cart.push({...currentProduct, quantity});
  saveCart(cart);
  updateCartCount();
  showToast(`${currentProduct.name} added to cart ✦`);
}

function buyNow(){
  addToCartAndGo();
  window.location.href='cart.html';
}

function showToast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;background:rgba(10,31,26,0.95);border:1px solid rgba(201,168,76,0.4);padding:14px 24px;border-radius:12px;font-size:14px;font-family:"Cormorant Garamond",serif;font-style:italic;color:#e2c47e;backdrop-filter:blur(20px);';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

updateCartCount();
loadProduct();
</script>
</body>
</html>
